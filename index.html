<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Table Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ink: {
                            950: '#0f172a',
                            900: '#111827',
                            800: '#1f2937',
                            700: '#334155',
                        },
                        accent: {
                            500: '#0891b2',
                            400: '#22d3ee',
                            100: '#cffafe',
                        }
                    },
                    fontFamily: {
                        display: ['"Space Grotesk"', 'sans-serif'],
                        sans: ['"Noto Sans KR"', 'sans-serif'],
                    }
                }
            }
        };
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link
        rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%230891b2'/%3E%3Cpath d='M18 18h28v28H18z' fill='none' stroke='white' stroke-width='4'/%3E%3Cpath d='M18 29h28M29 18v28' stroke='white' stroke-width='4'/%3E%3C/svg%3E"
    >
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div id="app-shell" class="app-shell">
        <aside id="sidebar" class="app-sidebar"></aside>
        <section class="app-main">
            <header id="topbar" class="app-topbar"></header>
            <main id="workspace" class="app-workspace"></main>
        </section>
    </div>

    <input type="file" id="import-json-file" accept=".json" hidden>
    <input type="file" id="import-csv-file" accept=".csv" hidden>
    <input type="file" id="import-excel-file" accept=".xlsx,.xls" hidden>

    <div id="toast-host" class="toast-host" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="./app.js"></script>
</body>
</html>
